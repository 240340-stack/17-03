<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор группы</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        .page {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        /* ── SESSION CARD ── */
        .session-name {
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .session-timer {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            color: #3b82f6;
            margin-bottom: 16px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .session-timer.paused  { color: #f59e0b; }
        .session-timer.ended   { color: #9ca3af; }

        .btn-end {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #ef4444;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .btn-end:disabled { background: #d1d5db; cursor: default; }
        .btn-end:not(:disabled):active { opacity: 0.8; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-break, .btn-exit {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            transition: opacity 0.15s, background 0.2s;
            color: white;
        }
        .btn-break { background: #f59e0b; }
        .btn-break.resume { background: #3b82f6; }
        .btn-break:disabled { background: #d1d5db; cursor: default; }
        .btn-break:not(:disabled):active { opacity: 0.8; }

        .btn-exit { background: #9ca3af; }
        .btn-exit:active { opacity: 0.8; }

        /* ── GROUP MONITOR ── */
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 14px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .user-item:last-child { border-bottom: none; }

        .dot-wrap { position: relative; flex-shrink: 0; width: 10px; height: 10px; }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #d1d5db;
        }
        .status-dot.online { background: #22c55e; }
        .status-dot.online::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: rgba(34,197,94,0.3);
            animation: ripple 1.8s ease-out infinite;
        }
        @keyframes ripple {
            0%   { transform: scale(0.7); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .user-info { flex: 1; min-width: 0; }
        .user-name-text { font-size: 14px; font-weight: 600; color: #1a1a2e; }

        .user-right { text-align: right; flex-shrink: 0; }
        .user-status-text {
            font-size: 12px;
            color: #6b7280;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        .user-time {
            font-size: 12px;
            color: #3b82f6;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        /* ── CHAT ── */
        .chat-messages {
            height: 180px;
            overflow-y: auto;
            border: 1px solid #f3f4f6;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .chat-msg {
            font-size: 13px;
            color: #374151;
            line-height: 1.45;
        }
        .chat-msg b { color: #1a1a2e; }
        .chat-msg.mine b { color: #3b82f6; }
        .chat-empty { color: #c4c9d4; font-size: 13px; text-align: center; margin: auto; }

        .chat-input-row { display: flex; gap: 8px; }
        .chat-input {
            flex: 1;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            background: #f9fafb;
            color: #1a1a2e;
            transition: border 0.2s, background 0.2s;
        }
        .chat-input:focus { border-color: #3b82f6; background: #fff; }
        .chat-input::placeholder { color: #c4c9d4; }
        .chat-send {
            width: 42px; height: 42px;
            border: none; border-radius: 10px;
            background: #22c55e; color: white;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: opacity 0.15s;
        }
        .chat-send:active { opacity: 0.75; }
    </style>
</head>
<body>
<div class="page">

    <!-- ① СЕССИЯ -->
    <div class="card">
        <div class="session-name" id="myName">Загрузка...</div>
        <div class="session-timer" id="sessionTimer">
            <span>⏱</span><span id="sessionTimerVal">0 сек.</span>
        </div>
        <button class="btn-end" id="btnEnd" onclick="endSession()">
            🚫 Завершить сессию
        </button>
        <div class="btn-row">
            <button class="btn-break" id="btnBreak" onclick="toggleBreak()">
                ☕ Перерыв
            </button>
            <button class="btn-exit" onclick="exitApp()">
                🚪 Выход
            </button>
        </div>
    </div>

    <!-- ② МОНИТОР ГРУППЫ -->
    <div class="card">
        <div class="card-title">👥 Монитор группы</div>
        <div id="groupList">Загрузка...</div>
    </div>

    <!-- ③ ЧАТ -->
    <div class="card">
        <div class="card-title">💬 Общий чат</div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">Нет сообщений</div>
        </div>
        <div class="chat-input-row">
            <input class="chat-input" id="chatInput" placeholder="Сообщение..."
                   onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="chat-send" onclick="sendMessage()">▶</button>
        </div>
    </div>

</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SB_URL = 'https://qugnylizprmsknwaamps.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1Z255bGl6cHJtc2tud2FhbXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTM2MjIsImV4cCI6MjA5MTcyOTYyMn0.kXDlml97pCnZYzIoa_xSujOhQyaGnCQciZt8NQ83RfQ';
    const MY_ID  = '66eaa7bc-173a-4450-bea8-c9cb4589f497';
    const ONLINE_MS = 90_000;

    const sb = createClient(SB_URL, SB_KEY);

    // ── Состояние ────────────────────────────────────────────────────────
    let groupData    = [];
    let myProfile    = null;
    let sessionStart = null;   // ISO строка
    let onBreak      = false;
    let breakStart   = null;   // ms timestamp
    let totalBreakMs = 0;
    let sessionEnded = false;

    // ── Форматирование ───────────────────────────────────────────────────
    function fmtSession(ms) {
        const total = Math.floor(ms / 1000);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        if (h > 0) return `${h} ч. ${String(m).padStart(2,'0')} мин.`;
        if (m > 0) return `${m} мин. ${String(s).padStart(2,'0')} сек.`;
        return `${s} сек.`;
    }

    function fmtStudy(since) {
        if (!since) return '';
        const secs = Math.max(0, Math.floor((Date.now() - new Date(since).getTime()) / 1000));
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        return `${h}ч ${m}м ${s}с`;
    }

    function isOnline(lastSeen) {
        return lastSeen && (Date.now() - new Date(lastSeen).getTime()) < ONLINE_MS;
    }

    function statusIcon(s) {
        return { 'Учусь':'📚','Кофе':'☕','В игре':'🎮','Дома':'🏠','Перерыв':'⏸','Завершил':'✅' }[s] || '●';
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Тик (каждую секунду) ─────────────────────────────────────────────
    function tick() {
        // Сессионный таймер
        if (sessionStart && !sessionEnded) {
            let active = Date.now() - new Date(sessionStart).getTime() - totalBreakMs;
            if (onBreak && breakStart) active -= (Date.now() - breakStart);
            if (active < 0) active = 0;
            document.getElementById('sessionTimerVal').textContent = fmtSession(active);
            const wrap = document.getElementById('sessionTimer');
            wrap.className = 'session-timer' + (onBreak ? ' paused' : '');
        }

        // Счётчики учёбы в списке
        document.querySelectorAll('[data-study]').forEach(el => {
            const since = el.dataset.study;
            if (since) el.textContent = fmtStudy(since);
        });
    }

    // ── Рендер группы ────────────────────────────────────────────────────
    function renderGroup() {
        const el = document.getElementById('groupList');
        if (!groupData.length) {
            el.innerHTML = '<div style="color:#c4c9d4;text-align:center;padding:14px">Пока никого нет</div>';
            return;
        }
        el.innerHTML = groupData.map(u => {
            const online   = isOnline(u.last_seen);
            const color    = u.color || '#9ca3af';
            const studying = u.study_started_at && u.status === 'Учусь';

            return `
            <div class="user-item">
                <div class="dot-wrap">
                    <div class="status-dot ${online ? 'online' : ''}"></div>
                </div>
                <div class="user-info">
                    <div class="user-name-text">${escHtml(u.username || '—')}</div>
                </div>
                <div class="user-right">
                    <div class="user-status-text">
                        ${statusIcon(u.status)}
                        <span style="color:${color}">${escHtml(u.status || '—')}</span>
                    </div>
                    <div class="user-time" ${studying ? `data-study="${u.study_started_at}"` : ''}>
                        ${studying ? fmtStudy(u.study_started_at) : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── Кнопки ───────────────────────────────────────────────────────────
    window.endSession = async () => {
        if (!confirm('Завершить сессию?')) return;
        sessionEnded = true;
        document.getElementById('sessionTimer').className = 'session-timer ended';
        document.getElementById('btnEnd').disabled  = true;
        document.getElementById('btnBreak').disabled = true;
        await sb.from('profiles').update({
            status: 'Завершил', color: '#22c55e',
            last_seen: new Date().toISOString(),
            study_started_at: null,
            is_on_break: false,
            session_started_at: null,
        }).eq('id', MY_ID);
        await fetchGroup();
    };

    window.toggleBreak = async () => {
        if (sessionEnded) return;
        if (!onBreak) {
            onBreak = true;
            breakStart = Date.now();
            const btn = document.getElementById('btnBreak');
            btn.textContent = '▶ Продолжить';
            btn.classList.add('resume');
            await sb.from('profiles').update({
                status: 'Перерыв', color: '#f59e0b',
                last_seen: new Date().toISOString(),
                is_on_break: true,
            }).eq('id', MY_ID);
        } else {
            if (breakStart) totalBreakMs += Date.now() - breakStart;
            breakStart = null;
            onBreak = false;
            const btn = document.getElementById('btnBreak');
            btn.textContent = '☕ Перерыв';
            btn.classList.remove('resume');
            await sb.from('profiles').update({
                status: 'Учусь', color: '#4c6ef5',
                last_seen: new Date().toISOString(),
                is_on_break: false,
            }).eq('id', MY_ID);
        }
        await fetchGroup();
    };

    window.exitApp = () => {
        if (confirm('Выйти из приложения?')) window.close();
    };

    // ── Чат ──────────────────────────────────────────────────────────────
    async function loadMessages() {
        const { data } = await sb.from('messages')
            .select('*').order('created_at', { ascending: true }).limit(60);
        if (!data) return;
        const box = document.getElementById('chatMessages');
        if (!data.length) {
            box.innerHTML = '<div class="chat-empty">Нет сообщений</div>';
            return;
        }
        box.innerHTML = data.map(m => `
            <div class="chat-msg ${m.user_id === MY_ID ? 'mine' : ''}">
                <b>${escHtml(m.username)}:</b> ${escHtml(m.text)}
            </div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        const text  = input.value.trim();
        if (!text || !myProfile) return;
        input.value = '';
        await sb.from('messages').insert({
            user_id:  MY_ID,
            username: myProfile.username,
            text:     text,
        });
    };

    function subscribeChat() {
        sb.channel('public:messages')
            .on('postgres_changes',
                { event: 'INSERT', schema: 'public', table: 'messages' },
                () => loadMessages())
            .subscribe();
    }

    // ── Supabase данные ───────────────────────────────────────────────────
    async function heartbeat() {
        await sb.from('profiles')
            .update({ last_seen: new Date().toISOString() })
            .eq('id', MY_ID);
    }

    async function fetchGroup() {
        const { data } = await sb.from('profiles').select('*').order('username');
        if (!data) return;
        groupData = data;
        myProfile  = data.find(u => u.id === MY_ID);
        if (myProfile) {
            document.getElementById('myName').textContent = myProfile.username || 'Неизвестно';
            // Подхватываем сессию из БД если уже была
            if (myProfile.session_started_at && !sessionStart) {
                sessionStart = myProfile.session_started_at;
            }
            onBreak = !!myProfile.is_on_break;
            const btn = document.getElementById('btnBreak');
            if (onBreak) { btn.textContent = '▶ Продолжить'; btn.classList.add('resume'); }
            else         { btn.textContent = '☕ Перерыв';    btn.classList.remove('resume'); }
        }
        renderGroup();
    }

    async function startSession() {
        const now = new Date().toISOString();
        sessionStart = now;
        await sb.from('profiles').update({
            status: 'Учусь', color: '#4c6ef5',
            last_seen: now,
            session_started_at: now,
            study_started_at:   now,
            is_on_break: false,
        }).eq('id', MY_ID);
        await fetchGroup();
    }

    // ── Init ─────────────────────────────────────────────────────────────
    await heartbeat();
    await fetchGroup();
    await loadMessages();
    subscribeChat();

    if (myProfile && myProfile.session_started_at) {
        sessionStart = myProfile.session_started_at;
    } else {
        await startSession();
    }

    setInterval(tick,       1_000);
    setInterval(fetchGroup, 10_000);
    setInterval(heartbeat,  30_000);
</script>
</body>
</html>
