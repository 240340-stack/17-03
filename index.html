<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM — Личные Сообщения</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #13131e;
      --surface2: #1c1c2e;
      --border: #2a2a40;
      --accent: #7c6fff;
      --accent2: #ff6b8a;
      --text: #e4e4f0;
      --muted: #6b6b88;
      --online: #4ade80;
      --radius: 12px;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
 
    /* AUTH */
    #auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 200; }
    #auth-screen.hidden { display: none; }
    .auth-card { width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 44px 40px; text-align: center; position: relative; overflow: hidden; }
    .auth-card::before { content: ''; position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 240px; height: 240px; background: radial-gradient(circle, rgba(124,111,255,0.25), transparent 70%); border-radius: 50%; pointer-events: none; }
    .auth-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .auth-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    .auth-title span { color: var(--accent); }
    .auth-sub { color: var(--muted); font-size: 13px; font-family: var(--mono); margin-bottom: 36px; line-height: 1.6; }
    .btn-google { width: 100%; padding: 14px 20px; background: #fff; color: #333; border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: opacity 0.2s, transform 0.1s; }
    .btn-google:hover { opacity: 0.92; }
    .btn-google:active { transform: scale(0.98); }
    .btn-google img { width: 20px; height: 20px; }
 
    /* LAYOUT */
    #app { display: flex; flex-direction: column; height: 100vh; }
    #app.hidden { display: none; }
    .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
    .topbar-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; margin-right: auto; }
    .topbar-logo span { color: var(--accent); }
    .topbar-user { display: flex; align-items: center; gap: 10px; font-size: 13px; font-family: var(--mono); }
    .topbar-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
    .topbar-name { color: var(--muted); }
    .btn-logout { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }
    .main-layout { display: flex; flex: 1; overflow: hidden; }
 
    /* SIDEBAR */
    .sidebar { width: 300px; min-width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); color: var(--muted); }
    .new-dm-btn { width: 28px; height: 28px; border-radius: 8px; background: var(--accent); border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; line-height: 1; }
    .new-dm-btn:hover { opacity: 0.82; }
    .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .search-inp { width: 100%; padding: 9px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.2s; }
    .search-inp:focus { border-color: var(--accent); }
    .search-inp::placeholder { color: var(--muted); }
    .threads-list { flex: 1; overflow-y: auto; }
    .threads-list::-webkit-scrollbar { width: 4px; }
    .threads-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .thread-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: background 0.15s; position: relative; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .thread-item:hover { background: var(--surface2); }
    .thread-item.active { background: rgba(124,111,255,0.1); }
    .thread-item.active::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; background: var(--accent); border-radius: 0 3px 3px 0; }
    .t-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; object-fit: cover; }
    .t-info { flex: 1; min-width: 0; }
    .t-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t-preview { font-size: 12px; color: var(--muted); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .t-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .t-time { font-size: 10px; color: var(--muted); font-family: var(--mono); }
    .t-badge { background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
    .empty-threads { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; font-family: var(--mono); line-height: 1.8; }
 
    /* CHAT */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .no-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); }
    .no-chat-icon { font-size: 56px; margin-bottom: 16px; }
    .no-chat h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
    .no-chat p { font-size: 13px; font-family: var(--mono); text-align: center; line-height: 1.6; }
    .chat-header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; object-fit: cover; }
    .chat-header-info h3 { font-size: 16px; font-weight: 700; }
    .chat-header-info p { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
    .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 4px; }
    .messages-area::-webkit-scrollbar { width: 5px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .msg-day { text-align: center; font-size: 11px; color: var(--muted); font-family: var(--mono); margin: 12px 0; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 75%; }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.theirs { align-self: flex-start; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; object-fit: cover; }
    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg-row.mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg-row.theirs .msg-bubble { background: var(--surface2); border-bottom-left-radius: 4px; }
    .msg-time { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 2px; padding: 0 4px; }
    .msg-row.mine .msg-time { text-align: right; }
    .msg-img { max-width: 220px; border-radius: 12px; display: block; margin-top: 6px; cursor: pointer; }
 
    /* INPUT */
    .chat-input-area { padding: 16px 24px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 12px; flex-shrink: 0; }
    .input-wrapper { flex: 1; display: flex; flex-direction: column; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; }
    .input-wrapper:focus-within { border-color: var(--accent); }
    #img-preview-wrap { padding: 8px 12px 0; display: none; align-items: center; gap: 8px; }
    #img-preview-wrap img { height: 60px; border-radius: 8px; }
    #clearImgBtn { background: none; border: none; color: var(--accent2); cursor: pointer; font-size: 16px; }
    .input-actions { display: flex; align-items: center; padding: 6px 8px 0; }
    .icon-btn { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s, background 0.2s; }
    .icon-btn:hover { color: var(--text); background: var(--border); }
    #msg-input { width: 100%; background: transparent; border: none; padding: 10px 16px 12px; color: var(--text); font-family: var(--sans); font-size: 14px; resize: none; outline: none; max-height: 120px; min-height: 44px; }
    #msg-input::placeholder { color: var(--muted); }
    .send-btn { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
    .send-btn:hover { opacity: 0.88; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
 
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 300; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.hidden { display: none; }
    .modal { width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; }
    .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal > p { color: var(--muted); font-size: 12px; font-family: var(--mono); margin-bottom: 24px; }
    .modal-input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--muted); }
    .users-found { max-height: 160px; overflow-y: auto; margin-bottom: 16px; }
    .user-found-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
    .user-found-item:hover { background: var(--surface2); }
    .user-found-item.selected { background: rgba(124,111,255,0.15); }
    .user-found-item img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .user-found-item b { font-size: 14px; display: block; }
    .user-found-item small { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .modal-actions { display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-family: var(--sans); font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-start { flex: 2; padding: 12px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-start:hover { opacity: 0.88; }
 
    /* COLORS */
    .c0 { background: linear-gradient(135deg,#7c6fff,#a78bfa); color: #fff; }
    .c1 { background: linear-gradient(135deg,#ff6b8a,#fb7185); color: #fff; }
    .c2 { background: linear-gradient(135deg,#34d399,#059669); color: #fff; }
    .c3 { background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #fff; }
    .c4 { background: linear-gradient(135deg,#60a5fa,#3b82f6); color: #fff; }
    .c5 { background: linear-gradient(135deg,#f472b6,#ec4899); color: #fff; }
 
    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 500; display: flex; align-items: center; justify-content: center; }
    .lightbox.hidden { display: none; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }
    .lightbox-close { position: absolute; top: 20px; right: 24px; font-size: 28px; color: #fff; background: none; border: none; cursor: pointer; }
  </style>
</head>
<body>
 
<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <span class="auth-icon">💬</span>
    <h1 class="auth-title">Direct<span>MSG</span></h1>
    <p class="auth-sub">Личные сообщения в реальном времени.<br>Войдите через Google чтобы начать.</p>
    <button class="btn-google" id="loginBtn">
      <img src="https://www.google.com/favicon.ico" alt="G">
      Войти через Google
    </button>
  </div>
</div>
 
<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <span class="topbar-logo">Direct<span>MSG</span></span>
    <div class="topbar-user">
      <img class="topbar-avatar" id="topAvatar" src="" alt="">
      <span class="topbar-name" id="topName"></span>
    </div>
    <button class="btn-logout" id="logoutBtn">Выйти</button>
  </div>
 
  <div class="main-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">Сообщения</span>
        <button class="new-dm-btn" id="newDmBtn" title="Новый диалог">+</button>
      </div>
      <div class="search-wrap">
        <input class="search-inp" id="searchInp" placeholder="🔍  Поиск диалогов...">
      </div>
      <div class="threads-list" id="threadsList">
        <div class="empty-threads">📭<br><br>Нет диалогов.<br>Нажмите «+» чтобы начать.</div>
      </div>
    </div>
 
    <!-- CHAT -->
    <div class="chat-area">
      <div class="no-chat" id="noChat">
        <div class="no-chat-icon">📨</div>
        <h2>Выберите диалог</h2>
        <p>Или начните новый разговор<br>нажав «+» слева</p>
      </div>
 
      <div id="chatHeader" class="chat-header" style="display:none;">
        <div id="chatHeaderAvatar" class="chat-header-avatar c0"></div>
        <div class="chat-header-info">
          <h3 id="chatHeaderName"></h3>
          <p id="chatHeaderEmail"></p>
        </div>
      </div>
 
      <div id="messagesArea" class="messages-area" style="display:none;"></div>
 
      <div id="chatInputArea" class="chat-input-area" style="display:none;">
        <div class="input-wrapper">
          <div id="img-preview-wrap">
            <img id="imgPreviewThumb" src="" alt="">
            <button id="clearImgBtn">✕</button>
          </div>
          <div class="input-actions">
            <label class="icon-btn" title="Прикрепить изображение" style="cursor:pointer;">
              📎<input type="file" id="imgFileInput" accept="image/*" style="display:none;">
            </label>
          </div>
          <textarea id="msg-input" rows="1" placeholder="Написать сообщение..."></textarea>
        </div>
        <button class="send-btn" id="sendBtn" disabled>➤</button>
      </div>
    </div>
  </div>
</div>
 
<!-- NEW DM MODAL -->
<div class="modal-overlay hidden" id="newDmModal">
  <div class="modal">
    <h3>Новый диалог</h3>
    <p>Введите email пользователя для поиска</p>
    <input class="modal-input" id="searchEmailInp" placeholder="email@example.com" type="email">
    <div class="users-found" id="usersFound"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelModal">Отмена</button>
      <button class="btn-start" id="startDmBtn">Начать диалог</button>
    </div>
  </div>
</div>
 
<!-- LIGHTBOX -->
<div class="lightbox hidden" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>
 
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy, where,
  onSnapshot, serverTimestamp, doc, setDoc, getDoc, getDocs,
  updateDoc, limit
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import {
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyB_PU4Y1et2-cf2VGWO8cJdIDaZwMJQUB8",
  authDomain: "po241-gulmamedov.firebaseapp.com",
  projectId: "po241-gulmamedov",
  storageBucket: "po241-gulmamedov.firebasestorage.app",
  messagingSenderId: "1045987096320",
  appId: "1:1045987096320:web:bcc59339a37de3fb60e5e5"
};
 
const app     = initializeApp(firebaseConfig);
const db      = getFirestore(app);
const auth    = getAuth(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();
 
let currentUser = null;
let currentThreadId = null;
let messagesUnsub = null;
let threadsUnsub = null;
let selectedFile = null;
let targetUser = null;
 
// ── Helpers ──────────────────────────────────────────
const COLORS = ['c0','c1','c2','c3','c4','c5'];
function colorFor(uid) {
  let n = 0; for (const c of (uid||'')) n += c.charCodeAt(0);
  return COLORS[n % COLORS.length];
}
function initials(name) {
  return (name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function timeStr(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function dateStr(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date();
  if (d.toDateString()===today.toDateString()) return 'Сегодня';
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  if (d.toDateString()===yest.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru');
}
function threadId(a, b) { return [a,b].sort().join('__'); }
 
function avatarEl(user, uid, size=44, cls='') {
  if (user && user.photoURL) {
    return `<img src="${user.photoURL}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;" class="${cls}" alt="">`;
  }
  const name = (user && user.displayName) || uid || '?';
  return `<div class="${cls} ${colorFor(uid)}" style="width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${size*0.35}px;">${initials(name)}</div>`;
}
 
// ── Auth ─────────────────────────────────────────────
document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
document.getElementById('logoutBtn').onclick = () => signOut(auth);
 
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    await setDoc(doc(db,'users',user.uid),{
      uid: user.uid, displayName: user.displayName,
      email: user.email, photoURL: user.photoURL||null
    },{merge:true});
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('topAvatar').src = user.photoURL||'';
    document.getElementById('topName').textContent = user.displayName;
    loadThreads();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    if (threadsUnsub) threadsUnsub();
    if (messagesUnsub) messagesUnsub();
  }
});
 
// ── Threads ───────────────────────────────────────────
function loadThreads() {
  const q = query(
    collection(db,'threads'),
    where('participants','array-contains',currentUser.uid),
    orderBy('lastAt','desc')
  );
  threadsUnsub = onSnapshot(q, async snap => {
    const list = document.getElementById('threadsList');
    list.innerHTML = '';
    if (snap.empty) {
      list.innerHTML = '<div class="empty-threads">📭<br><br>Нет диалогов.<br>Нажмите «+» чтобы начать.</div>';
      return;
    }
    for (const d of snap.docs) {
      const data = d.data();
      const tid = d.id;
      const otherId = data.participants.find(id => id !== currentUser.uid);
      let other = {};
      try { const s = await getDoc(doc(db,'users',otherId)); if(s.exists()) other = s.data(); } catch{}
 
      const unread = (data.unread && data.unread[currentUser.uid]) || 0;
      const preview = data.lastMsg ? (data.lastMsg.length>38 ? data.lastMsg.slice(0,38)+'…' : data.lastMsg) : '—';
 
      const item = document.createElement('div');
      item.className = 'thread-item' + (currentThreadId===tid ? ' active' : '');
      item.dataset.tid = tid;
      item.innerHTML = `
        ${avatarEl(other, otherId, 44, 't-avatar')}
        <div class="t-info">
          <div class="t-name">${other.displayName||other.email||otherId}</div>
          <div class="t-preview">${preview}</div>
        </div>
        <div class="t-meta">
          <div class="t-time">${timeStr(data.lastAt)}</div>
          ${unread ? `<div class="t-badge">${unread}</div>` : ''}
        </div>`;
      item.onclick = () => openThread(tid, other, otherId);
      list.appendChild(item);
    }
  });
}
 
// ── Open Thread ───────────────────────────────────────
async function openThread(tid, other, otherId) {
  currentThreadId = tid;
  document.querySelectorAll('.thread-item').forEach(el => el.classList.toggle('active', el.dataset.tid===tid));
 
  document.getElementById('noChat').style.display = 'none';
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('messagesArea').style.display = 'flex';
  document.getElementById('messagesArea').style.flexDirection = 'column';
  document.getElementById('chatInputArea').style.display = 'flex';
 
  // Header avatar
  const hAv = document.getElementById('chatHeaderAvatar');
  if (other.photoURL) {
    hAv.style.cssText = `width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;`;
    hAv.tagName === 'IMG' ? (hAv.src = other.photoURL) : hAv.outerHTML = `<img id="chatHeaderAvatar" class="chat-header-avatar" src="${other.photoURL}" alt="">`;
  } else {
    hAv.className = `chat-header-avatar ${colorFor(otherId)}`;
    hAv.textContent = initials(other.displayName||otherId);
  }
  document.getElementById('chatHeaderName').textContent = other.displayName||other.email||otherId;
  document.getElementById('chatHeaderEmail').textContent = other.email||'';
 
  // Reset unread
  try { await updateDoc(doc(db,'threads',tid), {[`unread.${currentUser.uid}`]: 0}); } catch{}
 
  // Messages
  if (messagesUnsub) messagesUnsub();
  const mq = query(collection(db,'threads',tid,'messages'), orderBy('createdAt','asc'));
  messagesUnsub = onSnapshot(mq, snap => {
    const area = document.getElementById('messagesArea');
    area.innerHTML = '';
    let lastDate = '';
    snap.forEach(d => {
      const msg = d.data();
      const isMe = msg.senderId === currentUser.uid;
      const dl = dateStr(msg.createdAt);
      if (dl !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'msg-day'; sep.textContent = dl;
        area.appendChild(sep); lastDate = dl;
      }
      const row = document.createElement('div');
      row.className = `msg-row ${isMe?'mine':'theirs'}`;
      const avHtml = isMe ? '' : avatarEl(other, otherId, 28, 'msg-avatar');
      const imgHtml = msg.imageUrl
        ? `<img src="${msg.imageUrl}" class="msg-img" onclick="openLightbox(this.src)">`
        : '';
      row.innerHTML = `
        ${avHtml}
        <div>
          <div class="msg-bubble">${msg.text ? escHtml(msg.text) : ''}${imgHtml}</div>
          <div class="msg-time">${timeStr(msg.createdAt)}</div>
        </div>`;
      area.appendChild(row);
    });
    area.scrollTop = area.scrollHeight;
  });
}
 
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
window.openLightbox = src => {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.remove('hidden');
};
 
// ── Send Message ──────────────────────────────────────
document.getElementById('sendBtn').onclick = sendMessage;
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height='auto';
  this.style.height = Math.min(this.scrollHeight,120)+'px';
  document.getElementById('sendBtn').disabled = !this.value.trim() && !selectedFile;
});
 
async function sendMessage() {
  if (!currentThreadId) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !selectedFile) return;
  document.getElementById('sendBtn').disabled = true;
 
  let imageUrl = null;
  if (selectedFile) {
    try {
      const sRef = ref(storage, `dm/${currentThreadId}/${Date.now()}_${selectedFile.name}`);
      const snap = await uploadBytes(sRef, selectedFile);
      imageUrl = await getDownloadURL(snap.ref);
    } catch(e) { console.warn('Upload failed:', e.message); }
    clearImg();
  }
 
  await addDoc(collection(db,'threads',currentThreadId,'messages'), {
    senderId: currentUser.uid,
    senderName: currentUser.displayName,
    text: text||'',
    imageUrl: imageUrl||null,
    createdAt: serverTimestamp()
  });
 
  // Thread meta
  const tRef = doc(db,'threads',currentThreadId);
  const tSnap = await getDoc(tRef);
  const tData = tSnap.data();
  const otherId = tData.participants.find(id => id!==currentUser.uid);
  await updateDoc(tRef, {
    lastMsg: text || '📷 Изображение',
    lastAt: serverTimestamp(),
    [`unread.${otherId}`]: (tData.unread?.[otherId]||0)+1,
    [`unread.${currentUser.uid}`]: 0
  });
 
  input.value=''; input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
}
 
// ── Image attach ──────────────────────────────────────
document.getElementById('imgFileInput').addEventListener('change', function() {
  const file = this.files[0]; if(!file) return;
  selectedFile = file;
  const r = new FileReader();
  r.onload = e => {
    document.getElementById('imgPreviewThumb').src = e.target.result;
    document.getElementById('img-preview-wrap').style.display = 'flex';
  };
  r.readAsDataURL(file);
  document.getElementById('sendBtn').disabled = false;
});
document.getElementById('clearImgBtn').onclick = clearImg;
function clearImg() {
  selectedFile = null;
  document.getElementById('img-preview-wrap').style.display = 'none';
  document.getElementById('imgPreviewThumb').src = '';
  document.getElementById('imgFileInput').value = '';
}
 
// ── New DM Modal ──────────────────────────────────────
document.getElementById('newDmBtn').onclick = () => {
  targetUser = null;
  document.getElementById('searchEmailInp').value = '';
  document.getElementById('usersFound').innerHTML = '';
  document.getElementById('newDmModal').classList.remove('hidden');
};
document.getElementById('cancelModal').onclick = () => document.getElementById('newDmModal').classList.add('hidden');
document.getElementById('newDmModal').onclick = e => { if(e.target===e.currentTarget) e.currentTarget.classList.add('hidden'); };
 
let searchTimer;
document.getElementById('searchEmailInp').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const val = this.value.trim().toLowerCase();
  const found = document.getElementById('usersFound');
  if (val.length < 2) { found.innerHTML=''; targetUser=null; return; }
  searchTimer = setTimeout(async () => {
    found.innerHTML = '<p style="color:var(--muted);font-size:12px;font-family:var(--mono);padding:8px;">Поиск...</p>';
    try {
      const q = query(collection(db,'users'), where('email','>=',val), where('email','<=',val+'\uf8ff'), limit(6));
      const snap = await getDocs(q);
      found.innerHTML='';
      let count=0;
      snap.forEach(d => {
        const u = d.data();
        if (u.uid===currentUser.uid) return;
        count++;
        const item = document.createElement('div');
        item.className='user-found-item';
        const av = u.photoURL
          ? `<img src="${u.photoURL}" alt="">`
          : `<div class="${colorFor(u.uid)}" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;">${initials(u.displayName)}</div>`;
        item.innerHTML = `${av}<div><b>${u.displayName||'—'}</b><small>${u.email}</small></div>`;
        item.onclick = () => {
          targetUser = u;
          document.querySelectorAll('.user-found-item').forEach(el=>el.classList.remove('selected'));
          item.classList.add('selected');
        };
        found.appendChild(item);
      });
      if(!count) found.innerHTML='<p style="color:var(--muted);font-size:12px;font-family:var(--mono);padding:8px 12px;">Пользователь не найден</p>';
    } catch(e) {
      found.innerHTML=`<p style="color:var(--accent2);font-size:12px;padding:8px;">Ошибка: ${e.message}</p>`;
    }
  }, 400);
});
 
document.getElementById('startDmBtn').onclick = async () => {
  if (!targetUser) { alert('Выберите пользователя из списка'); return; }
  const tid = threadId(currentUser.uid, targetUser.uid);
  const tRef = doc(db,'threads',tid);
  const tSnap = await getDoc(tRef);
  if (!tSnap.exists()) {
    await setDoc(tRef, {
      participants: [currentUser.uid, targetUser.uid],
      lastMsg: '', lastAt: serverTimestamp(),
      unread: { [currentUser.uid]: 0, [targetUser.uid]: 0 }
    });
  }
  document.getElementById('newDmModal').classList.add('hidden');
  openThread(tid, targetUser, targetUser.uid);
};
 
// ── Search threads ────────────────────────────────────
document.getElementById('searchInp').addEventListener('input', function() {
  const val = this.value.toLowerCase();
  document.querySelectorAll('.thread-item').forEach(el => {
    const name = el.querySelector('.t-name')?.textContent.toLowerCase()||'';
    el.style.display = name.includes(val) ? '' : 'none';
  });
});
 
// ── Lightbox ──────────────────────────────────────────
document.getElementById('lightboxClose').onclick = () => document.getElementById('lightbox').classList.add('hidden');
document.getElementById('lightbox').onclick = e => { if(e.target===e.currentTarget) e.currentTarget.classList.add('hidden'); };
</script>
