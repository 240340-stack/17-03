<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DirectMSG — Full Fix with Supabase</title>
    <style>
        :root { --bg: #0d0d14; --surf: #13131e; --accent: #7c6fff; --border: #2a2a40; --text: #e4e4f0; --muted: #6b6b88; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surf); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px; color: var(--muted); }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        #listContainer { flex: 1; overflow-y: auto; }
        .thread-item, .user-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .thread-item:hover, .user-item:hover { background: rgba(255,255,255,0.05); }
        .thread-item.active { background: rgba(124,111,255,0.1); border-left: 4px solid var(--accent); }

        /* Status Dot */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* Main Chat Area */
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        #chatHeader { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: bold; background: var(--surf); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 10px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
        .msg.me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--border); color: var(--text); border-bottom-left-radius: 2px; }

        /* Controls Area */
        .controls { padding: 15px; border-top: 1px solid var(--border); background: var(--surf); }
        .status-btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .status-btn { font-size: 10px; padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border); background: none; color: white; cursor: pointer; }

        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surf); }
        input[type="text"] { flex: 1; background: #1c1c2e; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .full-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-screen" class="full-screen">
    <div style="text-align:center;">
        <h1>DirectMSG</h1>
        <button id="loginBtn">Войти через Google</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        <div id="myDisplayName">Загрузка...</div>
        <div id="myInfo" style="font-size: 11px; color: var(--muted); margin-top: 5px;"></div>
    </div>
    
    <div class="tabs">
        <div class="tab active" id="tabChats">ЧАТЫ</div>
        <div class="tab" id="tabGroup">ГРУППА</div>
    </div>

    <div id="listContainer">
        <div id="threadsList"></div>
        <div id="groupList" class="hidden"></div>
    </div>

    <div class="controls">
        <div style="font-size: 12px;">Мой статус:</div>
        <div class="status-btn-group">
            <button class="status-btn" onclick="changeStatus('В сети', '#44ff44')">В сети</button>
            <button class="status-btn" onclick="changeStatus('Занят', '#ff4444')">Занят</button>
            <button class="status-btn" onclick="changeStatus('Отошел', '#ffaa00')">Отошел</button>
        </div>
        <button id="logoutBtn" style="background:none; color:var(--muted); font-size:12px; margin-top:10px; width:100%; text-align:left;">Выйти</button>
    </div>
</div>

<div class="main">
    <div id="chatHeader">
        <span>Выберите чат</span>
        <button id="addChatBtn" style="padding: 5px 12px;">+ Новый чат</button>
    </div>
    <div id="messages"></div>
    <div id="inputBox" class="input-area hidden">
        <input type="text" id="msgInp" placeholder="Напишите сообщение...">
        <button id="sendBtn">ОТПРАВИТЬ</button>
    </div>
</div>

<script type="module">
// ИМПОРТЫ (Firebase + Supabase)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// КОНФИГУРАЦИЯ
const firebaseConfig = {
    apiKey: "AIzaSyB_PU4Y1et2-cf2VGWO8cJdIDaZwMJQUB8",
    authDomain: "po241-gulmamedov.firebaseapp.com",
    projectId: "po241-gulmamedov",
    storageBucket: "po241-gulmamedov.appspot.com",
    messagingSenderId: "1045987096320",
    appId: "1:1045987096320:web:bcc59339a37de3fb60e5e5"
};

// Данные Supabase из вашего скриншота
const SUPABASE_URL = 'https://rncerhgizyjhovbdpqn1.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ThL+LS6uBeakf8FynDIFTg_OOINJSyh';
const MY_ID = '4bc5694e-89f8-47d9-9b60-2d3bd2439122'; // ID из скриншота

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let me = null;
let activeThreadId = null;

// --- SUPABASE: СТАТУСЫ И ГРУППА ---
window.changeStatus = async (text, color) => {
    const { error } = await supabase.from('profiles').update({ status: text, color: color }).eq('id', MY_ID);
    if (error) alert("Ошибка Supabase: " + error.message);
    else fetchGroup();
};

async function fetchGroup() {
    const { data, error } = await supabase.from('profiles').select('*').order('username', { ascending: true });
    if (error) return console.error(error);
    
    const list = document.getElementById('groupList');
    list.innerHTML = data.map(user => `
        <div class="user-item">
            <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
            <div style="flex-grow: 1;">
                <strong>${user.username}</strong><br>
                <small style="color: #666;">${user.status || 'Нет статуса'}</small>
            </div>
        </div>
    `).join('');

    const currentMe = data.find(u => u.id === MY_ID);
    if (currentMe) document.getElementById('myInfo').innerText = `Статус: ${currentMe.status || '—'}`;
}

// --- FIREBASE: АВТОРИЗАЦИЯ И ЧАТ ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        me = user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('myDisplayName').innerText = user.displayName;
        loadThreads();
        fetchGroup();
        setInterval(fetchGroup, 10000); // Обновляем группу каждые 10 сек
    } else {
        document.getElementById('auth-screen').classList.remove('hidden');
    }
});

// Переключение табов
document.getElementById('tabChats').onclick = () => {
    document.getElementById('threadsList').classList.remove('hidden');
    document.getElementById('groupList').classList.add('hidden');
    document.getElementById('tabChats').classList.add('active');
    document.getElementById('tabGroup').classList.remove('active');
};
document.getElementById('tabGroup').onclick = () => {
    document.getElementById('threadsList').classList.add('hidden');
    document.getElementById('groupList').classList.remove('hidden');
    document.getElementById('tabGroup').classList.add('active');
    document.getElementById('tabChats').classList.remove('active');
};

// Функция загрузки чатов (из вашего кода)
function loadThreads() {
    const q = query(collection(db, "threads"), where("participants", "array-contains", me.uid), orderBy("lastAt", "desc"));
    onSnapshot(q, (snap) => {
        const list = document.getElementById('threadsList');
        list.innerHTML = '';
        snap.forEach(d => {
            const t = d.data();
            const div = document.createElement('div');
            div.className = 'thread-item' + (activeThreadId === d.id ? ' active' : '');
            div.innerHTML = `<strong>Чат: ${d.id.substring(0,8)}</strong><br><small>${t.lastMsg || ''}</small>`;
            div.onclick = () => openChat(d.id);
            list.appendChild(div);
        });
    });
}

async function openChat(tid) {
    activeThreadId = tid;
    document.getElementById('inputBox').classList.remove('hidden');
    const q = query(collection(db, "threads", tid, "messages"), orderBy("at", "asc"));
    onSnapshot(q, (snap) => {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        snap.forEach(m => {
            const data = m.data();
            const div = document.createElement('div');
            div.className = 'msg ' + (data.from === me.uid ? 'me' : 'them');
            div.innerText = data.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
document.getElementById('sendBtn').onclick = async () => {
    const inp = document.getElementById('msgInp');
    if (!inp.value.trim() || !activeThreadId) return;
    await addDoc(collection(db, "threads", activeThreadId, "messages"), { from: me.uid, text: inp.value, at: serverTimestamp() });
    await setDoc(doc(db, "threads", activeThreadId), { lastAt: serverTimestamp(), lastMsg: inp.value }, { merge: true });
    inp.value = '';
};
</script>
</body>
</html>
