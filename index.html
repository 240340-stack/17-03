<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Bad</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 500px; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 4px 1px rgba(0,0,0,0.05); }
    input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.1s; }
    .post { background: #fff; border: 1px solid #e0e0e0; padding: 13px; margin-top: 15px; border-radius: 8px; width: 500px; position: relative; }
    .like-btn { cursor: pointer; border: none; background: #fbf9fa; padding: 1px 13px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
    time { font-size: 11px; color: #999; float: right; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
  </div>
  <div id="feed" style="width: 100%; max-width: 500px;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, query, orderBy, onSnapshot,
      serverTimestamp, updateDoc, doc, increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_PU4Y1et2-cf2VGW08cJdIDaZwMJQUB8",
      authDomain: "po241-gulmamedov.firebaseapp.com",
      projectId: "po241-gulmamedov",
      storageBucket: "po241-gulmamedov.firebasestorage.app",
      messagingSenderId: "1045987096320",
      appId: "1:1045987096320:web:bcc59339a37de3fb60e5e5",
      measurementId: "G-70L1MW750X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ✅ ФУНКЦИЯ 1: Атомарное увеличение лайков (increment)
    window.processLike = async (id) => {
      const docRef = doc(db, "requests", id);
      try {
        await updateDoc(docRef, { likes: increment(1) });
      } catch (e) {
        console.error("Validation Error:", e.message);
      }
    };

    // ✅ ФУНКЦИЯ 2: Добавление записи в Firestore (addDoc)
    document.getElementById('mainBtn').onclick = async () => {
      const nameVal = document.getElementById('name').value.trim();
      const emailVal = document.getElementById('email').value.trim();

      // Валидация на стороне клиента
      if (!nameVal || !emailVal) {
        alert("Заполните все поля!");
        return;
      }

      const btn = document.getElementById('mainBtn');
      btn.disabled = true;

      try {
        await addDoc(collection(db, "requests"), {
          name: nameVal,
          email: emailVal,
          likes: 0,
          timestamp: serverTimestamp()
        });
        document.getElementById('name').value = "";
        document.getElementById('email').value = "";
      } catch (e) {
        alert("Ошибка безопасности: Данные отклонены сервером.\n" + e.message);
      }

      btn.disabled = false;
    };

    // Реактивная лента — onSnapshot
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      const feed = document.getElementById('feed');
      feed.innerHTML = "";
      snapshot.forEach((d) => {
        const data = d.data();
        feed.innerHTML +=
          `<div class="post">
            <time>${data.timestamp?.toDate().toLocaleTimeString() || '...'}</time>
            <b>${data.name}</b>
            <p>${data.email}</p>
            <button class="like-btn" onclick="processLike('${d.id}')">👍 ${data.likes || 0}</button>
          </div>`;
      });
    });
  </script>
</body>
</html>
