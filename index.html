<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Облачное приложение</title>
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .auth-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
    input, textarea { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
    textarea { resize: vertical; min-height: 80px; }
    button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 6px; }
    button:hover { background: #0056b3; }
    .logout-btn { background: #dc3545; }
    .post { background: #fff; border: 1px solid #e0e0e0; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; box-sizing: border-box; }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .post-avatar { width: 38px; height: 38px; border-radius: 50%; }
    .like-btn { cursor: pointer; border: 1px solid #eee; background: #fbf9fa; padding: 5px 15px; border-radius: 20px; font-size: 14px; width: auto; margin-top: 10px; }
    time { font-size: 11px; color: #999; margin-left: auto; }
    .preview-img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
    #imagePreview { max-width: 100%; border-radius: 8px; margin-top: 8px; display: none; }
    .upload-label { display: block; padding: 10px; border: 2px dashed #007bff; border-radius: 8px; text-align: center; cursor: pointer; color: #007bff; margin: 6px 0; }
  </style>
</head>
<body>


  <div class="container">
    <h3>Облачное приложение</h3>


    <button id="loginBtn">🔐 Войти через Google</button>


    <div id="userInfo" style="display:none;">
      <div class="auth-bar">
        <img id="userPhoto" class="user-avatar" src="" alt="avatar">
        <span id="userName" style="font-weight: bold;"></span>
        <button class="logout-btn" id="logoutBtn" style="width:auto; padding: 8px 16px;">Выйти</button>
      </div>
    </div>
  </div>


  <div id="messageForm" class="container" style="display:none;">
    <h4>Создать запись</h4>
    <input type="text" id="name" placeholder="Ваше имя" readonly>
    <input type="email" id="email" placeholder="Ваш Email" readonly>
    <textarea id="content" placeholder="Что у вас нового?"></textarea>


    <label class="upload-label" for="imageInput">📎 Прикрепить картинку</label>
    <input type="file" id="imageInput" accept="image/*" style="display:none;">
    <img id="imagePreview" alt="preview">

    <button id="mainBtn">Опубликовать в облако</button>
  </div>


  <div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, query, orderBy,
      onSnapshot, serverTimestamp, updateDoc, doc, increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import {
      getAuth, signInWithPopup, GoogleAuthProvider,
      signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB_PU4Y1et2-cf2VGWO8cJdIDaZwMJQUB8",
      authDomain: "po241-gulmamedov.firebaseapp.com",
      projectId: "po241-gulmamedov",
      storageBucket: "po241-gulmamedov.firebasestorage.app",
      messagingSenderId: "1045987096320",
      appId: "1:1045987096320:web:bcc59339a37de3fb60e5e5",
      measurementId: "G-70L1MW750X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const messageForm = document.getElementById('messageForm');

    loginBtn.onclick = () => signInWithPopup(auth, provider);
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginBtn.style.display = 'none';
        userInfo.style.display = 'flex';
        messageForm.style.display = 'block';
        document.getElementById('userPhoto').src = user.photoURL;
        document.getElementById('userName').textContent = user.displayName;
        document.getElementById('name').value = user.displayName;
        document.getElementById('email').value = user.email;
      } else {
        loginBtn.style.display = 'block';
        userInfo.style.display = 'none';
        messageForm.style.display = 'none';
      }
    });

    document.getElementById('mainBtn').onclick = async () => {
      const content = document.getElementById('content').value;
      if (!content) return alert('Введите текст сообщения!');
      const btn = document.getElementById('mainBtn');
      btn.disabled = true;
      btn.textContent = 'Отправка...';
      try {
        await addDoc(collection(db, "requests"), {
          name: auth.currentUser.displayName,
          email: auth.currentUser.email,
          photo: auth.currentUser.photoURL,
          text: content,
          likes: 0,
          timestamp: serverTimestamp()
        });
        document.getElementById('content').value = "";
      } catch (e) {
        alert("Ошибка: " + e.message);
      }
      btn.disabled = false;
      btn.textContent = 'Опубликовать в облако';
    };

    window.processLike = async (id) => {
      await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    };

    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      const feed = document.getElementById('feed');
      feed.innerHTML = "";
      snapshot.forEach((d) => {
        const data = d.data();
        feed.innerHTML += `
          <div class="post">
            <div class="post-header">
              <img src="${data.photo || 'https://via.placeholder.com/38'}" class="post-avatar">
              <b>${data.name}</b>
              <time>${data.timestamp?.toDate().toLocaleTimeString() || '...'}</time>
            </div>
            <p>${data.text || data.email}</p>
            <button class="like-btn" onclick="processLike('${d.id}')">👍 ${data.likes || 0}</button>
          </div>`;
      });
    });

    window.db = db;
  </script>
</body>
</html>
