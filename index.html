<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DirectMSG — Рабочий Чат</title>
    <style>
        :root { --bg: #0d0d14; --surf: #13131e; --accent: #7c6fff; --border: #2a2a40; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; height: 100vh; display: flex; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surf); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        
        /* Список чатов */
        .thread-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .thread-item:hover { background: rgba(255,255,255,0.05); }
        .thread-item.active { border-left: 4px solid var(--accent); background: rgba(124,111,255,0.1); }
        
        /* Окно сообщений */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--accent); }
        .msg.them { align-self: flex-start; background: var(--border); }
        
        /* Ввод */
        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; background: #1c1c2e; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* Модалка */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--surf); padding: 30px; border-radius: 20px; width: 350px; border: 1px solid var(--border); }
        .user-res { padding: 10px; margin-top: 5px; cursor: pointer; border-radius: 8px; border: 1px solid transparent; }
        .user-res.selected { border-color: var(--accent); background: rgba(124,111,255,0.1); }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200;">
    <button id="loginBtn" style="font-size:18px;">Войти через Google</button>
</div>

<div class="sidebar">
    <div style="padding: 20px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between;">
        <b>Чаты</b>
        <button id="addChat" style="padding: 2px 10px;">+</button>
    </div>
    <div id="threadsList"></div>
</div>

<div class="main">
    <div id="chatHeader" style="padding:15px; border-bottom:1px solid var(--border);">Выберите чат</div>
    <div id="messages"></div>
    <div id="inputBox" class="input-area hidden">
        <input type="text" id="msgInp" placeholder="Напишите сообщение...">
        <button id="sendBtn">➤</button>
    </div>
</div>

<div id="modal" class="modal hidden">
    <div class="modal-content">
        <h3>Новый чаt</h3>
        <input type="text" id="searchInp" placeholder="Email...">
        <div id="results"></div>
        <button id="startBtn" style="margin-top:15px;">Создать</button>
        <button id="closeBtn" style="background:none; margin-top:5px;">Отмена</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB_PU4Y1et2-cf2VGWO8cJdIDaZwMJQUB8",
    authDomain: "po241-gulmamedov.firebaseapp.com",
    projectId: "po241-gulmamedov",
    storageBucket: "po241-gulmamedov.appspot.com",
    messagingSenderId: "1045987096320",
    appId: "1:1045987096320:web:bcc59339a37de3fb60e5e5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let me = null;
let activeThreadId = null;
let targetUser = null;
let unsubMsgs = null;

onAuthStateChanged(auth, async (user) => {
    if (user) {
        me = user;
        await setDoc(doc(db, "users", user.uid), { uid: user.uid, email: user.email, displayName: user.displayName }, { merge: true });
        document.getElementById('auth-screen').classList.add('hidden');
        loadThreads();
    }
});

document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);

// ЗАГРУЗКА СПИСКА ЧАТОВ
function loadThreads() {
    const q = query(collection(db, "threads"), where("participants", "array-contains", me.uid));
    onSnapshot(q, (snap) => {
        const list = document.getElementById('threadsList');
        list.innerHTML = '';
        snap.forEach(d => {
            const t = d.data();
            const div = document.createElement('div');
            div.className = 'thread-item';
            div.innerText = 'Чат: ' + d.id.replace(me.uid, '').replace('__', '');
            div.onclick = () => openChat(d.id);
            list.appendChild(div);
        });
    });
}

// ОТКРЫТИЕ ЧАТА
function openChat(tid) {
    activeThreadId = tid;
    document.getElementById('inputBox').classList.remove('hidden');
    document.getElementById('chatHeader').innerText = "Чат активен";
    
    if (unsubMsgs) unsubMsgs();
    const q = query(collection(db, "threads", tid, "messages"), orderBy("at", "asc"));
    unsubMsgs = onSnapshot(q, (snap) => {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        snap.forEach(m => {
            const data = m.data();
            const div = document.createElement('div');
            div.className = 'msg ' + (data.from === me.uid ? 'me' : 'them');
            div.innerText = data.text;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
}

// ОТПРАВКА
document.getElementById('sendBtn').onclick = async () => {
    const inp = document.getElementById('msgInp');
    if (!inp.value.trim() || !activeThreadId) return;
    await addDoc(collection(db, "threads", activeThreadId, "messages"), {
        from: me.uid,
        text: inp.value,
        at: serverTimestamp()
    });
    inp.value = '';
};

// ПОИСК И СОЗДАНИЕ (из прошлого шага)
document.getElementById('addChat').onclick = () => document.getElementById('modal').classList.remove('hidden');
document.getElementById('closeBtn').onclick = () => document.getElementById('modal').classList.add('hidden');
document.getElementById('searchInp').oninput = async (e) => {
    const val = e.target.value.toLowerCase().trim();
    if (val.length < 3) return;
    const q = query(collection(db, "users"), where("email", ">=", val), where("email", "<=", val + "\uf8ff"));
    const snap = await getDocs(q);
    const res = document.getElementById('results');
    res.innerHTML = '';
    snap.forEach(d => {
        const u = d.data();
        if (u.uid === me.uid) return;
        const div = document.createElement('div');
        div.className = 'user-res';
        div.innerHTML = u.email;
        div.onclick = () => {
            targetUser = u;
            document.querySelectorAll('.user-res').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
        };
        res.appendChild(div);
    });
};

document.getElementById('startBtn').onclick = async () => {
    if (!targetUser) return;
    const tid = [me.uid, targetUser.uid].sort().join("__");
    await setDoc(doc(db, "threads", tid), { participants: [me.uid, targetUser.uid], lastAt: serverTimestamp() }, { merge: true });
    document.getElementById('modal').classList.add('hidden');
    openChat(tid);
};
</script>
</body>
</html>
