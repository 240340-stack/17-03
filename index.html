<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DM FIX</title>
    <style>
        body { background: #0d0d14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #13131e; padding: 40px; border-radius: 20px; border: 1px solid #2a2a40; text-align: center; width: 350px; }
        button { background: #7c6fff; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a2a40; background: #1c1c2e; color: white; box-sizing: border-box; }
        .user-item { padding: 10px; border: 1px solid #2a2a40; margin-top: 5px; cursor: pointer; border-radius: 8px; }
        .user-item:hover { background: #1c1c2e; }
        .selected { border-color: #7c6fff; background: rgba(124, 111, 255, 0.2); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-screen" class="card">
    <h2>DirectMSG</h2>
    <button id="loginBtn">Войти через Google</button>
</div>

<div id="app" class="card hidden">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h4 id="userName">Меню</h4>
        <button id="logoutBtn" style="width: auto; padding: 5px 10px; font-size: 10px;">Выйти</button>
    </div>
    <button id="openModalBtn">+ Новый чат</button>
    <div id="threadsList" style="margin-top:20px; text-align: left;"></div>
</div>

<div id="modal" class="card hidden" style="position: fixed; z-index: 10;">
    <h3>Поиск</h3>
    <input type="text" id="searchInp" placeholder="Введите email...">
    <div id="results"></div>
    <button id="startBtn">Начать</button>
    <button id="closeBtn" style="background: #2a2a40;">Отмена</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB_PU4Y1et2-cf2VGWO8cJdIDaZwMJQUB8",
    authDomain: "po241-gulmamedov.firebaseapp.com",
    projectId: "po241-gulmamedov",
    storageBucket: "po241-gulmamedov.appspot.com",
    messagingSenderId: "1045987096320",
    appId: "1:1045987096320:web:bcc59339a37de3fb60e5e5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let me = null;
let target = null;

// АВТОРИЗАЦИЯ
onAuthStateChanged(auth, async (user) => {
    if (user) {
        me = user;
        await setDoc(doc(db, "users", user.uid), { uid: user.uid, email: user.email, displayName: user.displayName }, { merge: true });
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('userName').innerText = user.displayName;
    } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
    }
});

document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider).catch(e => alert("Ошибка входа: " + e.message));
document.getElementById('logoutBtn').onclick = () => signOut(auth);

// ПОИСК
document.getElementById('openModalBtn').onclick = () => {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('results').innerHTML = '';
    target = null;
};
document.getElementById('closeBtn').onclick = () => document.getElementById('modal').classList.add('hidden');

document.getElementById('searchInp').oninput = async (e) => {
    const val = e.target.value.toLowerCase().trim();
    if (val.length < 3) return;

    const q = query(collection(db, "users"), where("email", ">=", val), where("email", "<=", val + "\uf8ff"));
    const snap = await getDocs(q);
    const res = document.getElementById('results');
    res.innerHTML = '';

    snap.forEach(d => {
        const u = d.data();
        if (u.uid === me.uid) return;
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `<b>${u.displayName}</b><br>${u.email}`;
        div.onclick = () => {
            target = u;
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
            div.classList.add('selected');
        };
        res.appendChild(div);
    });
};

// СОЗДАНИЕ ЧАТА
document.getElementById('startBtn').onclick = async () => {
    if (!target) return alert("Выбери человека из списка!");
    
    try {
        const chatId = [me.uid, target.uid].sort().join("__");
        await setDoc(doc(db, "threads", chatId), {
            participants: [me.uid, target.uid],
            lastAt: serverTimestamp()
        }, { merge: true });
        
        alert("Успех! Диалог создан.");
        document.getElementById('modal').classList.add('hidden');
    } catch (e) {
        alert("Ошибка базы: " + e.message);
    }
};
</script>
</body>
</html>
